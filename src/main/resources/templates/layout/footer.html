<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<footer th:fragment="foot" class="mt-20 border-t border-rose-200/70 bg-white/70 backdrop-blur-sm">
    <div class="max-w-7xl mx-auto px-6 py-10">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div>
                <h3 class="text-lg font-semibold text-rose-700">마음온도</h3>
                <p class="mt-3 text-sm leading-6 text-stone-600">
                    하루의 감정을 기록하고, 다른 사람의 이야기에 공감하며,
                    조금 더 따뜻한 하루를 만드는 감정 공유 서비스입니다.
                </p>
            </div>

            <div>

                <ul class="mt-3 space-y-2 text-sm text-stone-600">
                    <li><a th:href="@{/}" class="hover:text-rose-600 transition">HOME</a></li>
                    <li><a th:href="@{/posts}" class="hover:text-rose-600 transition">감정 글 둘러보기</a></li>

                <p class="mt-3 text-sm leading-6 text-stone-600">
                    어떤 감정이든 괜찮아요.
                    말이 되는 마음도, 아직 이름 붙지 않은 마음도 이곳에서는 환영입니다.
                </p>
            </div>
        </div>

        <div class="mt-8 pt-6 border-t border-rose-100 flex flex-col md:flex-row md:items-center md:justify-between gap-3 text-xs text-stone-500">
            <p>© 2026 마음온도. All rights reserved.</p>
            <p>Made with Spring Boot, Thymeleaf, JPA, Security</p>
