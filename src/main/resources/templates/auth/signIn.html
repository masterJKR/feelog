<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<div layout:fragment="main">
    <main class="flex-grow flex items-center justify-center px-6 py-12">
        <div class="w-full max-w-md rounded-3xl border border-rose-100 bg-white/90 backdrop-blur p-8 md:p-10 shadow-lg">

            <div class="text-center mb-8">
                <div class="text-4xl mb-3">🌸</div>
                <h2 class="text-2xl font-bold text-rose-700">다시 만나서 반가워요</h2>
                <p class="mt-2 text-sm text-stone-500 leading-6">
                    오늘의 마음을 기록하고, 서로의 감정에 온기를 더해보세요
                </p>
            </div>

            <!-- 로그인 실패 메시지 -->
            <div th:if="${param.error}"
                 class="mb-5 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
                아이디 또는 비밀번호를 다시 확인해주세요.
            </div>

            <!-- 로그아웃 메시지 -->
            <div th:if="${param.logout}"
                 class="mb-5 rounded-2xl border border-green-200 bg-green-50 px-4 py-3 text-sm text-green-700">
                안전하게 로그아웃되었습니다.
            </div>

            <form th:action="@{/signIn}" method="post" class="space-y-5">

                <div>
                    <label for="username" class="block text-sm font-medium text-stone-700 mb-1">
                        아이디
                    </label>
                    <input type="text"
                           id="username"
                           name="username"
                           placeholder="아이디를 입력하세요"
                           class="w-full rounded-xl border border-stone-300 px-4 py-3 outline-none focus:border-rose-300 focus:ring-2 focus:ring-rose-200 bg-white" />
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-stone-700 mb-1">
                        비밀번호
                    </label>
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="비밀번호를 입력하세요"
                           class="w-full rounded-xl border border-stone-300 px-4 py-3 outline-none focus:border-rose-300 focus:ring-2 focus:ring-rose-200 bg-white" />
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="inline-flex items-center gap-2 text-stone-600">
                        <input type="checkbox" name="remember-me" class="rounded border-stone-300 text-rose-500 focus:ring-rose-300">
                        <span>로그인 상태 유지</span>
                    </label>
                </div>

                <button type="submit"
                        class="w-full rounded-xl bg-rose-400 px-4 py-3 text-white font-semibold shadow-md transition hover:bg-rose-500">
                    로그인
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-stone-600">
                아직 계정이 없으신가요?
                <a th:href="@{/signUp}" class="ml-1 font-semibold text-rose-600 hover:underline">
                    회원가입
                </a>
            </div>

            <div class="mt-8 rounded-2xl bg-gradient-to-r from-rose-50 via-orange-50 to-amber-50 border border-rose-100 p-4">
                <p class="text-sm font-semibold text-rose-700">오늘의 한 줄</p>
                <p class="mt-2 text-sm leading-6 text-stone-600">
                    마음은 숨기면 더 무거워지고, 나누면 조금 가벼워지기도 합니다.
                </p>
            </div>
        </div>
    </main>
</div>

</html>
