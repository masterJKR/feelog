<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<div layout:fragment="main">
    <main class="flex-grow flex items-center justify-center px-6 py-12">

        <div class="w-full max-w-xl bg-white/90 backdrop-blur rounded-3xl shadow-lg border border-rose-100 p-10">

            <div class="text-center mb-8">
                <div class="text-4xl mb-3">💗</div>
                <h2 class="text-2xl font-bold text-rose-700">마음온도 회원가입</h2>
                <p class="text-sm text-stone-500 mt-2">
                    당신의 감정을 기록할 따뜻한 공간에 오신 것을 환영합니다
                </p>
            </div>

            <form th:action="@{/signUp}" method="post" th:object="${signupDto}" class="space-y-6">

                <!-- 아이디 -->
                <div>
                    <label class="block text-sm font-medium text-stone-700 mb-1">
                        아이디
                    </label>

                    <input type="text"
                           th:field="*{username}"
                           placeholder="아이디를 입력하세요"
                           class="w-full rounded-xl border border-stone-300 px-4 py-3 focus:ring-2 focus:ring-rose-300 focus:border-rose-300 outline-none"/>

                    <p th:if="${#fields.hasErrors('username')}"
                       th:errors="*{username}"
                       class="text-red-500 text-sm mt-1"></p>

                </div>

                <!-- 이름 -->
                <div>
                    <label class="block text-sm font-medium text-stone-700 mb-1">
                        이름
                    </label>

                    <input type="text"
                           th:field="*{name}"
                           placeholder="이름을 입력하세요"
                           class="w-full rounded-xl border border-stone-300 px-4 py-3 focus:ring-2 focus:ring-rose-300 focus:border-rose-300 outline-none"/>

                    <p th:if="${#fields.hasErrors('name')}"
                       th:errors="*{name}"
                       class="text-red-500 text-sm mt-1"></p>

                </div>

                <!-- 비밀번호 -->
                <div>
                    <label class="block text-sm font-medium text-stone-700 mb-1">
                        비밀번호
                    </label>

                    <input type="password"
                           th:field="*{password}"
                           placeholder="비밀번호 입력"
                           class="w-full rounded-xl border border-stone-300 px-4 py-3 focus:ring-2 focus:ring-rose-300 focus:border-rose-300 outline-none"/>

                    <p th:if="${#fields.hasErrors('password')}"
                       th:errors="*{password}"
                       class="text-red-500 text-sm mt-1"></p>

                </div>

                <!-- 비밀번호 확인 -->
                <div>
                    <label class="block text-sm font-medium text-stone-700 mb-1">
                        비밀번호 확인
                    </label>

                    <input type="password"
                           th:field="*{passwordConfirm}"
                           placeholder="비밀번호 다시 입력"
                           class="w-full rounded-xl border border-stone-300 px-4 py-3 focus:ring-2 focus:ring-rose-300 focus:border-rose-300 outline-none"/>

                </div>

                <!-- 제출 버튼 -->
                <div>

                    <button
                            class="w-full bg-rose-400 hover:bg-rose-500 text-white font-semibold py-3 rounded-xl transition shadow-md">
                        회원가입
                    </button>

                </div>

            </form>

            <!-- 로그인 이동 -->
            <div class="text-center mt-6 text-sm text-stone-600">

                이미 계정이 있으신가요?

                <a th:href="@{/signIn}"
                   class="text-rose-600 font-semibold hover:underline ml-1">
                    로그인
                </a>

            </div>

        </div>

    </main>
</div>

</html>
