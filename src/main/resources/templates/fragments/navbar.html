<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
                xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<nav th:fragment="navbar" class="sticky top-0 z-50 border-b border-rose-200/70
                                 bg-white/80 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex items-center justify-between h-16">
            <div class="flex items-center gap-2 ">
                <a th:href="@{/}" class="text-sm md:text-base font-medium text-stone-700
                                           hover:text-rose-600 transition">
                    HOME
                </a>
                <a th:href="@{/post}" class="text-sm md:text-base font-medium text-stone-700
                                           hover:text-rose-600 transition">
                    감정글
                </a>
                <a th:href="@{/post/new}" class="text-sm md:text-base font-medium text-stone-700
                                           hover:text-rose-600 transition">
                    글쓰기
                </a>
                <a th:href="@{/user/mypage}" class="text-sm md:text-base font-medium text-stone-700
                                           hover:text-rose-600 transition">
                    MYPAGE
                </a>
            </div>
            <!-- 로그인 -->
            <div sec:authorize="isAuthenticated()" class="flex items-center gap-2">
                <span class="text-sm text-stone-700">
                    <span sec:authentication="principal.name"></span>님
                </span>
                <a th:href="@{/logout}"
                   class="px-4 py-2 rounded-xl text-sm font-medium
                   text-stone-600 hover:text-stone-600 transition">
                    로그아웃
                </a>
            </div>
            <!--  비로그인 -->
            <div sec:authorize="isAnonymous()" class="flex items-center gap-2">
                <a th:href="@{/signIn}"
                   class="px-4 py-2 rounded-xl text-sm font-medium
                            text-rose-700 bg-rose-50 hover:bg-rose-100
                            border border-rose-200 transition">
                    로그인
                </a>
                <a th:href="@{/signUp}"
                   class="px-4 py-2 rounded-xl text-sm font-medium
                            text-white bg-rose-400 hover:bg-rose-500
                             shadow-sm transition">
                    회원가입
                </a>
            </div>
        </div>
    </div>

</nav>

</html>
